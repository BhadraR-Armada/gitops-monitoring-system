apiVersion: v1
data:
  argocd-status.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 6,
          "panels": [],
          "title": "ArgoCD Apps",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "footer": {
                  "reducers": []
                },
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 1
          },
          "id": 3,
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "pluginVersion": "12.4.1",
          "targets": [
            {
              "editorMode": "builder",
              "exemplar": false,
              "expr": "argocd_app_info",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Metrics Info",
          "transformations": [
            {
              "id": "filterFieldsByName",
              "options": {
                "include": {
                  "names": [
                    "autosync_enabled",
                    "container",
                    "dest_namespace",
                    "dest_server",
                    "endpoint",
                    "exported_namespace",
                    "health_status",
                    "instance",
                    "job",
                    "name",
                    "namespace",
                    "pod",
                    "project",
                    "repo",
                    "service",
                    "sync_status"
                  ]
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "id": 5,
          "panels": [],
          "title": "App Health Status",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "Degraded": {
                      "color": "red",
                      "index": 0,
                      "text": "DEGRADED"
                    },
                    "Healthy": {
                      "color": "green",
                      "index": 1,
                      "text": "HEALTHY"
                    },
                    "Missing": {
                      "color": "red",
                      "index": 2,
                      "text": "MISSING"
                    },
                    "Progressing": {
                      "color": "blue",
                      "index": 4,
                      "text": "PROGRESSING"
                    },
                    "Unknown": {
                      "color": "gray",
                      "index": 3,
                      "text": "UNKNOWN"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 10
          },
          "id": 1,
          "maxPerRow": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "/^health_status$/",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "value",
            "wideLayout": true
          },
          "pluginVersion": "12.4.1",
          "repeat": "appname",
          "repeatDirection": "h",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "max(argocd_app_info{name=\"$appname\"}) by (name, health_status) > 0",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "${appname}",
          "transformations": [
            {
              "id": "filterByValue",
              "options": {
                "filters": [
                  {
                    "config": {
                      "id": "isNull",
                      "options": {}
                    },
                    "fieldName": "health_status"
                  }
                ],
                "match": "any",
                "type": "exclude"
              }
            }
          ],
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "id": 4,
          "panels": [],
          "title": "App Sync Status",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "OutOfSync": {
                      "color": "orange",
                      "text": "OUT OF SYNC"
                    },
                    "Synced": {
                      "color": "blue",
                      "text": "SYNCED"
                    },
                    "Unknown": {
                      "color": "gray",
                      "text": "UNKNOWN"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 17
          },
          "id": 2,
          "maxPerRow": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "/^sync_status$/",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "value",
            "wideLayout": true
          },
          "pluginVersion": "12.4.1",
          "repeat": "appname",
          "repeatDirection": "h",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "max(argocd_app_info{name=\"$appname\"}) by (name, sync_status)",
              "format": "table",
              "instant": true,
              "refId": "B"
            }
          ],
          "title": "${appname}",
          "type": "stat"
        }
      ],
      "preload": false,
      "refresh": "",
      "schemaVersion": 42,
      "tags": [
        "argocd"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "text": "All",
              "value": [
                "$__all"
              ]
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "definition": "label_values(argocd_app_info,name)",
            "includeAll": true,
            "multi": true,
            "name": "appname",
            "options": [],
            "query": {
              "qryType": 1,
              "query": "label_values(argocd_app_info,name)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "regexApplyTo": "value",
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "ArgoCD Status Dashboard (Health & Sync Rows)",
      "uid": "argocd-split-rows",
      "version": 6,
      "weekStart": ""
    }
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: "1"
  name: argocd-status-dashboard
  namespace: monitoring
